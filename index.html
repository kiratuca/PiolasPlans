*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff5f8; --surface:#ffffff; --surface2:#fdeef4; --border:#f5c6d6;

h1,h2,h3{font-family:'Playfair Display',serif}

.nav-logo{font-family:'Playfair Display',serif;font-weight:800;font-size:18px;color:var(--pink);cursor:pointer}
.nav-tabs{display:flex;gap:2px}
.tab-btn{background:none;border:none;color:var(--muted);font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;padding:6px 12px;border-radius:99px;cursor:pointer;}
.tab-btn.active{color:#fff;background:var(--pink)}
.page{display:none;padding:20px;max-width:860px;margin:0 auto}
.page.active{display:block}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--card-r);padding:20px;margin-bottom:14px;position:relative}
.stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px 12px; text-align: center; display: flex; flex-direction: column; justify-content: center; min-height: 90px; }
.stat-num { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 800; color: var(--pink); line-height: 1; }
.stat-label { font-size: 10px; color: var(--muted); margin-top: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
.grid-4 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
@media(min-width: 600px) { .grid-4 { grid-template-columns: 1fr 1fr 1fr 1fr; } }
@media(max-width: 600px) { .grid-3 { grid-template-columns: 1fr; } }
.plan-item{display:flex;align-items:flex-start;gap:14px;padding:16px;background:var(--surface);border:1.5px solid var(--border);border-radius:14px;margin-bottom:10px;cursor:pointer;transition:all 0.18s;}
.plan-item.past{opacity:0.6; filter: grayscale(0.8); border-style: dashed;}
.date-block{background:var(--pink-light);border-radius:10px;padding:8px 12px;text-align:center;min-width:55px}
.date-day{font-family:'Playfair Display',serif;font-size:22px;font-weight:800;color:var(--pink)}
.avatar-stack { display: flex; align-items: center; margin-top: 8px; }

.av-mini:first-child { margin-left: 0; }
.av-count { font-size: 11px; color: var(--muted); margin-left: 8px; font-weight: 700; }
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 20px;border-radius:99px;border:none;font-weight:700;font-size:13px;cursor:pointer;transition:all 0.15s}
.btn-pink{background:var(--pink);color:#fff}
.btn-ghost{background:var(--surface);color:var(--text);border:1.5px solid var(--border)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(58,26,46,0.4);backdrop-filter:blur(5px);z-index:200;align-items:center;justify-content:center;padding:20px}

.modal{background:var(--surface);border:1px solid var(--border);border-radius:22px;padding:28px;width:100%;max-width:400px;position:relative}
.modal-close{position:absolute; top:15px; right:15px; font-size:24px; cursor:pointer; color:var(--muted); line-height:1}
.comment-box{background:linear-gradient(135deg,var(--pink-light),rgba(255,220,235,0.4));border:1px solid var(--pink-soft);border-radius:14px;padding:16px 18px 16px 34px;font-style:italic;color:var(--muted);font-size:13px;line-height:1.6;position:relative;margin-bottom:20px;}

.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800}
.av-36{width:36px;height:36px;font-size:13px}
.avc-0{background:#34c9a0; color:white;} .avc-1{background:#f472a8; color:white;} .avc-2{background:#ff7b6b; color:white;} .avc-3{background:#9b7fe8; color:white;} .avc-4{background:#6aaef5; color:white;} .avc-5{background:#f5c842; color:white;} .avc-6{background:#a03870; color:white;} .avc-7{background:#1a8a6a; color:white;} .avc-8{background:#6040b0; color:white;} .avc-9{background:#c06020; color:white;}

function getToday() {
  const d = new Date();
  d.setMinutes(d.getMinutes() - d.getTimezoneOffset());

async function loadData() {

// COMPRESSOR D'IMATGES
async function compressImage(file) {
    return new Promise((resolve) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (e) => {
            const img = new Image();
            img.src = e.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                let width = img.width;
                let height = img.height;
                const MAX_SIZE = 1200;
                if (width > height && width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; }
                else if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; }
                canvas.width = width; canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                canvas.toBlob((blob) => {
                    resolve(new File([blob], file.name, { type: 'image/jpeg' }));
                }, 'image/jpeg', 0.7);
            };
        };
    });
}

async function handleFileSelect(event) {
    const originalFile = event.target.files[0];
    const planId = document.getElementById('edit-plan-id').value;
    if(!originalFile || !planId) return;

    const loader = document.getElementById('upload-loading');
    loader.style.display = 'block';

    const file = await compressImage(originalFile);
    const fileName = `${planId}/${Date.now()}.jpg`;

    const { data, error } = await _supabase.storage.from('event-photos').upload(fileName, file);

    if(!error) {
        const { data: { publicUrl } } = _supabase.storage.from('event-photos').getPublicUrl(fileName);
        const p = STATE.plans.find(p => p.id == planId);
        const newGallery = [...(p.gallery || []), publicUrl];
        await _supabase.from('plans').update({ gallery: newGallery }).eq('id', planId);
        toast("Foto de record guardada! 📸");
        await loadData();
    }
    loader.style.display = 'none';
}

async function deleteGalleryPhoto(planId, photoUrl) {
    if(!confirm("Segur que vols esborrar aquest record?")) return;
    const p = STATE.plans.find(p => p.id == planId);
    const newGallery = p.gallery.filter(url => url !== photoUrl);
    
    const { error } = await _supabase.from('plans').update({ gallery: newGallery }).eq('id', planId);
    if(!error) {
        const path = photoUrl.split('/public/event-photos/')[1];
        if(path) await _supabase.storage.from('event-photos').remove([path]);
        toast("Foto esborrada 🗑️");
        await loadData();
        openPlanDetail(planId);
    }
}

async function savePlanAction() {
    const id = document.getElementById('edit-plan-id').value;
    const title = document.getElementById('input-plan-title').value;
    const date = document.getElementById('input-plan-date').value;
    const description = document.getElementById('input-plan-desc').value;
    const image_url = document.getElementById('input-plan-img').value;

    if(!title || !date) return toast("Falten dades!");

    if(id) {
        await _supabase.from('plans').update({ title, date, description, image_url }).eq('id', id);
        toast("Pla actualitzat! ✨");
    } else {
        await _supabase.from('plans').insert([{ title, date, description, image_url, gallery: [], participants: [STATE.currentUserId] }]);
        toast("Pla creat! 🥳");
    }
    closeModal('modal-create-plan');
    await loadData();
    showPage('plans');
}

    document.getElementById('input-plan-img').value = p.image_url || "";

}

  if(!STATE.currentUserId) return openModal('modal-select-user');
  const p = STATE.plans.find(p => p.id == planId);
  let newParticipants = [...(p.participants || [])];
  if(newParticipants.includes(STATE.currentUserId)) newParticipants = newParticipants.filter(id => id !== STATE.currentUserId);
  else newParticipants.push(STATE.currentUserId);
  const { error } = await _supabase.from('plans').update({ participants: newParticipants }).eq('id', planId);
  if(!error) { await loadData(); openPlanDetail(planId); }
}

async function deletePlan(id) {
  if(confirm("Segur que vols eliminar aquest pla?")) {
    const { error } = await _supabase.from('plans').delete().eq('id', id);
    if(!error) { await loadData(); showPage('plans'); toast("Pla eliminat 🗑️"); }
  }
}

function getStats(userId) {
  const today = getToday();
  const past = STATE.plans.filter(p => p.date < today);
  const attended = past.filter(p => (p.participants || []).includes(userId)).length;
  const rate = past.length > 0 ? Math.round((attended / past.length) * 100) : 0;
  return { attended, total: past.length, rate };
}

function renderHome() {
  const u = STATE.users.find(u => u.id === STATE.currentUserId);
  document.getElementById('home-greeting').textContent = u ? `Hola, ${u.name}! 👋` : "Hola, Convidat! 👋";
  const oracleBox = document.getElementById('home-oracle');
  const statsContainer = document.getElementById('home-stats-container');
  if(u) {
    const s = getStats(u.id);
    statsContainer.style.display = 'grid';
    statsContainer.innerHTML = `<div class="stat-pill"><div class="stat-num">${s.rate}%</div><div class="stat-label">Assistència</div></div><div class="stat-pill"><div class="stat-num">${s.attended}</div><div class="stat-label">Plans fets</div></div>`;
    const pool = s.rate > 80 ? ORACLE_QUOTES.high : (s.rate > 40 ? ORACLE_QUOTES.mid : ORACLE_QUOTES.low);
    oracleBox.textContent = pool[Math.floor(Math.random() * pool.length)];
  } else { statsContainer.style.display = 'none'; oracleBox.textContent = ORACLE_QUOTES.guest[0]; }
  const today = getToday();
  const next = STATE.plans.filter(p => p.date >= today).sort((a,b) => a.date.localeCompare(b.date))[0];
  const nextDiv = document.getElementById('home-next-plan');
  nextDiv.innerHTML = next ? `<div class="section-title">Propera cita</div><div class="card card-pink" onclick="openPlanDetail('${next.id}')" style="cursor:pointer"><h3>${next.title}</h3><p>📅 ${next.date}</p></div>` : "";
  const sorted = [...STATE.users].sort((a,b) => getStats(b.id).rate - getStats(a.id).rate);
  document.getElementById('home-ranking').innerHTML = sorted.slice(0,5).map((user, idx) => {
    const s = getStats(user.id);
    return `<div class="user-row ${user.id === STATE.currentUserId ? 'me' : ''}"><div style="font-size:12px; font-weight:800; color:var(--muted); width:20px">${idx+1}</div><div class="av av-36 avc-${user.colorIdx}">${user.name[0]}</div><div style="flex:1; font-weight:700">${user.name}</div><div style="font-weight:800; color:var(--pink-dark)">${s.rate}%</div></div>`;
  }).join('');
}

function renderPlans() {
  const list = document.getElementById('plans-list');
  const today = getToday();
  const sorted = [...STATE.plans].sort((a,b) => b.date.localeCompare(a.date));
  if (STATE.plans.length === 0) { list.innerHTML = "<p style='text-align:center; padding:40px; color:var(--muted)'>Cap pla.</p>"; return; }
  list.innerHTML = sorted.map(p => {
    const parts = (p.participants || []).map(pid => STATE.users.find(u => u.id === pid)).filter(Boolean);
    const disp = parts.slice(0, 5);
    const extra = parts.length - disp.length;
    return `<div class="plan-item ${p.date < today ? 'past' : ''}" onclick="openPlanDetail('${p.id}')"><div class="date-block"><div class="date-day">${p.date.split('-')[2]}</div><div style="font-size:9px; font-weight:800; text-transform:uppercase">${new Date(p.date).toLocaleString('ca-ES', {month:'short'})}</div></div><div style="flex:1"><div style="font-weight:700">${p.title}</div><div style="font-size:12px; color:var(--muted)">${p.date}</div><div class="avatar-stack">${disp.map(u => `<div class="av-mini avc-${u.colorIdx}">${u.name[0]}</div>`).join('')}${extra > 0 ? `<div class="av-count">+${extra}</div>` : (parts.length > 0 ? `<div class="av-count">${parts.length}</div>` : '')}</div></div></div>`;
  }).join('');
}

function renderStats() {
  const today = getToday();
  const past = STATE.plans.filter(p => p.date < today);
  const allRates = STATE.users.map(u => getStats(u.id).rate);
  const avg = allRates.length ? Math.round(allRates.reduce((a,b)=>a+b,0) / allRates.length) : 0;
  document.getElementById('stats-content').innerHTML = `<div class="stat-pill"><div class="stat-num">${avg}%</div><div class="stat-label">Assistència</div></div><div class="stat-pill"><div class="stat-num">${past.length}</div><div class="stat-label">Plans Fets</div></div><div class="stat-pill"><div class="stat-num">${STATE.plans.length - past.length}</div><div class="stat-label">Pendents</div></div>`;
  const sorted = [...STATE.users].sort((a,b) => getStats(b.id).rate - getStats(a.id).rate);
  const best = sorted[0]; const worst = sorted[sorted.length-1];
  document.getElementById('stats-leaderboard').innerHTML = `<div class="card" style="border-left: 4px solid var(--mint)"><div style="font-size:10px; font-weight:800; color:var(--mint); margin-bottom:5px">MÉS FIABLE 🦴</div><div style="display:flex; align-items:center; gap:10px"><div class="av av-36 avc-${best.colorIdx}">${best.name[0]}</div><div style="font-weight:700">${best.name} (${getStats(best.id).rate}%)</div></div></div><div class="card" style="border-left: 4px solid var(--coral)"><div style="font-size:10px; font-weight:800; color:var(--coral); margin-bottom:5px">MÉS FANTASMA 👻</div><div style="display:flex; align-items:center; gap:10px"><div class="av av-36 avc-${worst.colorIdx}">${worst.name[0]}</div><div style="font-weight:700">${worst.name} (${getStats(worst.id).rate}%)</div></div></div>`;
}

function updateNav() {
  const u = STATE.users.find(u => u.id === STATE.currentUserId);
  document.getElementById('nav-uname').textContent = u ? u.name : "Convidat";
  const navAv = document.getElementById('nav-av');
  navAv.textContent = u ? u.name[0] : "?";
  navAv.className = u ? `av av-36 avc-${u.colorIdx}` : "av av-36 tag-muted";
}

function showPage(name) {
  const currentActive = document.querySelector('.page.active');
  if (currentActive && currentActive.id !== 'page-plan-detail' && name === 'plan-detail') {
    localStorage.setItem('pp_previous_page', currentActive.id.replace('page-', ''));
  }

  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  const btn = document.querySelector(`[data-page="${name}"]`);
  if(btn) btn.classList.add('active');
  
  localStorage.setItem('pp_current_page', name);

  if(name === 'home') renderHome();
  if(name === 'plans') renderPlans();
  if(name === 'stats') renderStats();
}

function toggleUserMenu() {
  const d = document.getElementById('user-dropdown');
  const isOpening = d.style.display === 'none';
  d.style.display = isOpening ? 'block' : 'none';
  if (isOpening) {
    document.getElementById('dropdown-auth-content').innerHTML = STATE.currentUserId ? 
      `<a onclick="openModal('modal-select-user'); closeUserMenu()">🔄 Canviar perfil</a><a onclick="logout()" style="color:var(--coral)">👋 Sortir</a>` :
      `<a onclick="openModal('modal-select-user'); closeUserMenu()">👤 Triar qui ets</a>`;
  }
}

function loginAs(id) { STATE.currentUserId = id; localStorage.setItem('pp_current_user', id); closeModal('modal-select-user'); updateNav(); renderHome(); toast("Perfil carregat! ✨"); }
function logout() { STATE.currentUserId = null; localStorage.removeItem('pp_current_user'); updateNav(); closeUserMenu(); renderHome(); toast("Sessió tancada 👋"); }
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { 
  document.getElementById(id).classList.remove('open'); 
  document.getElementById('edit-plan-id').value = "";
  document.getElementById('input-plan-title').value = "";
  document.getElementById('input-plan-date').value = "";
  document.getElementById('input-plan-desc').value = "";
  document.getElementById('input-plan-img').value = "";
  document.getElementById('upload-section').style.display = 'none';
  document.getElementById('modal-plan-header').innerText = "Nou pla 🌟";
  document.getElementById('btn-save-plan').innerText = "Desar";
}
function closeUserMenu() { document.getElementById('user-dropdown').style.display = 'none'; }
function toast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000); }
function handleCreatePlanClick() { if(!STATE.currentUserId) { openModal('modal-select-user'); toast("Tria qui ets primer!"); } else openModal('modal-create-plan'); }

document.getElementById('user-select-grid').innerHTML = STATE.users.map(u => `<div class="btn btn-ghost" style="flex-direction:column; padding:15px; height:auto" onclick="loginAs('${u.id}')"><div class="av av-36 avc-${u.colorIdx}">${u.name[0]}</div><div style="font-size:11px; margin-top:5px">${u.name}</div></div>`).join('');
window.onclick = function(event) { if (!event.target.closest('#nav-user-pill')) closeUserMenu(); }

// Inicialització asíncrona segura
updateNav();
loadData().then(() => {
  const savedPage = localStorage.getItem('pp_current_page') || 'home';
  if (savedPage === 'plan-detail') {
    const savedPlanId = localStorage.getItem('pp_current_plan_id');
    if (savedPlanId) {
      openPlanDetail(savedPlanId);
    } else {
      showPage('plans');
    }
  } else {
    showPage(savedPage);
  }
});
</script>
</body>
</html>
